services:
  db:
    image: postgres:15
    container_name: getapet_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./backend/db-init:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend/src
    container_name: getapet_backend
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src:/app
  test:
    build: ./backend/src
    depends_on:
      - db
    env_file:
      - .env
    command: go test ./...
volumes:
  pgdata: