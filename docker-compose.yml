services:
  db:
    build:
      context: ./backend
      dockerfile: postgres/Dockerfile
    container_name: getapet_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: getapet_backend
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: sh -c "swag init -d ./cmd,./internal -g main.go --parseInternal --parseDependency --parseDepth 2 -o ./docs && go run ./cmd"

  test:
    build: ./backend
    depends_on:
      - db
    env_file:
      - .env
    command: go test ./...

  lint:
    build: ./backend
    working_dir: /app
    command: sh -c "go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest && golangci-lint run ./..."
  fmt:
    build: ./backend
    working_dir: /app
    command: sh -c "go install golang.org/x/tools/cmd/goimports@v0.40.0 && goimports -w ."
  security:
    build: ./backend
    command: sh -c "go install golang.org/x/vuln/cmd/govulncheck@v1.1.4 && /go/bin/govulncheck ./..."
volumes:
  pgdata:

