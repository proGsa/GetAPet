        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/delivery_http_purchaserequest.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get all purchase requests
      tags:
      - purchase-requests
    post:
