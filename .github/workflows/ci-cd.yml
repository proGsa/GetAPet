name: CI/CD Pipeline

on:
  push:
    branches: [ "dev" ]
  pull_request:

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24

      - name: Check formatting
        working-directory: backend
        run: |
          go fmt ./...
          test -z "$(git diff --exit-code)"

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s latest

      - name: Run lint
        working-directory: backend
        run: ../bin/golangci-lint run ./...

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run unit tests (docker compose)
        run: |
          docker compose -f /backend/tests/docker-compose.unit.yml up --build --abort-on-container-exit --exit-code-from unit-tests
  
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run integration tests (docker compose)
        run: |
          docker compose -f /backend/tests/docker-compose.integration.yml up --build --abort-on-container-exit --exit-code-from integration-tests

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run security check
        working-directory: backend
        run: govulncheck ./...

  build:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [fmt, lint, unit-tests, security]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24

      - name: Build
        working-directory: backend
        run: go build -o ./bin/app ./cmd

  docs:
    name: Generate Swagger Docs
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24

      - name: Install swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Generate docs
        working-directory: backend
        run: swag init -d ./cmd,./internal -g main.go --parseInternal --parseDependency --parseDepth 2 -o ./docs

  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, docs]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t getapet-backend:latest ./backend

      - name: Deploy (SSH example)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /app/getapet
            git pull
            docker compose down
            docker compose up -d --build